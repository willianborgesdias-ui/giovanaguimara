      trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6"
    };

    const PSICOLOGA_DEFAULT_PORTRAIT = "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=600&auto=format&fit=crop";

    // Dynamic Icon Component
    function Icon({ name, className = "w-5 h-5" }) {
      const pathData = ICONS[name] || "";
      return (
        <svg 
          className={className} 
          viewBox="0 0 24 24" 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2" 
          strokeLinecap="round" 
          strokeLinejoin="round"
        >
          <path d={pathData} />
        </svg>
      );
    }

    // Direct Logo SVG component following the provided branding
    function Logo({ className = "w-12 h-12", darkText = true, customLogoSrc = null }) {
      return (
        <div className="flex items-center gap-3 select-none">
          {customLogoSrc ? (
            <img 
              src={customLogoSrc} 
              alt="Logo Dra. Giovana Guimara" 
              className="w-12 h-12 rounded-full object-cover border border-brand-100 bg-white" 
            />
          ) : (
            <svg 
              viewBox="0 0 120 120" 
              className={className}
              fill="none" 
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="60" cy="60" r="54" stroke="#dff2ee" strokeWidth="1" strokeDasharray="3 3" />
              <g stroke="#7bc5bd" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">

          <div className="flex flex-col select-none">
            <span className={`font-brand font-bold text-lg md:text-xl tracking-wide leading-none ${darkText ? 'text-brand-900' : 'text-white'}`}>
              Giovana Guimara
            </span>
            <span className={`font-sans text-[10px] md:text-[11px] font-semibold tracking-wider uppercase mt-1 leading-none ${darkText ? 'text-brand-600' : 'text-brand-100'}`}>

            <span className={`font-mono text-[8px] tracking-widest uppercase mt-0.5 ${darkText ? 'text-gray-400' : 'text-brand-200/80'}`}>

    // Main App Component
    function App() {
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [activeTab, setActiveTab] = useState("neuro"); // 'neuro', 'psi', 'reab'
      const [activeFAQ, setActiveFAQ] = useState(0);
      
      const [customPortrait, setCustomPortrait] = useState(null);
      const [customLogo, setCustomLogo] = useState(null);
      const [isCustomizerOpen, setIsCustomizerOpen] = useState(false);

      useEffect(() => {
        const savedPortrait = localStorage.getItem("psicologa_foto_personalizada");
        const savedLogo = localStorage.getItem("psicologa_logo_personalizado");
        if (savedPortrait) setCustomPortrait(savedPortrait);
        if (savedLogo) setCustomLogo(savedLogo);
      }, []);

      const handlePortraitUpload = (e) => {
        const file = e.target.files?.[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64String = reader.result;
            setCustomPortrait(base64String);
            localStorage.setItem("psicologa_foto_personalizada", base64String);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleLogoUpload = (e) => {
        const file = e.target.files?.[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64String = reader.result;
            setCustomLogo(base64String);
            localStorage.setItem("psicologa_logo_personalizado", base64String);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleResetMedia = () => {
        if (window.confirm("Deseja voltar a usar as imagens padrão?")) {
          localStorage.removeItem("psicologa_foto_personalizada");
          localStorage.removeItem("psicologa_logo_personalizado");
          setCustomPortrait(null);
          setCustomLogo(null);
        }
      };

      // Interactive Self-Assessment Quiz State
      const [quizStarted, setQuizStarted] = useState(false);
      const [currentQuizQuestion, setCurrentQuizQuestion] = useState(0);
      const [quizAnswers, setQuizAnswers] = useState({});
      const [quizCompleted, setQuizCompleted] = useState(false);

      // Forms state
      const [formData, setFormData] = useState({
        nome: "",
        telefone: "",
        email: "",
        servico: "Avaliação Neuropsicológica",
        periodo: "Qualquer Período",
        mensagem: ""
      });
      const [formSubmitted, setFormSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const navItems = [
        { label: "Início", id: "#inicio" },
        { label: "Sobre Mim", id: "#sobre" },
        { label: "Especialidades", id: "#especialidades" },
        { label: "Triagem Cognitiva", id: "#triagem" },
        { label: "Consultório", id: "#consultorio" },
        { label: "Dúvidas", id: "#FAQ" },
      ];

      const quizQuestions = [
        {
          id: 1,
          category: "Atenção & Concentração",
          question: "Com que frequência você sente que sua mente dispersa facilmente em tarefas longas ou que exige esforço contínuo?",
          options: [
            { text: "Raramente / Quase nunca", score: 1 },
            { text: "Às vezes / Situações pontuais", score: 2 },
            { text: "Frequentemente / Atrapalha o dia a dia", score: 3 }
          ]
        },
        {
          id: 2,
          category: "Memória Recente",
          question: "Percebe pequenos lapsos de memória recente, como esquecer onde colocou pertences comuns ou conversas ocorridas no mesmo dia?",
          options: [
            { text: "Raramente", score: 1 },
            { text: "Às vezes, moderadamente", score: 2 },
            { text: "Frequentemente, gerando atrasos", score: 3 }
          ]
        },
        {
          id: 3,
          category: "Funções Executivas",
          question: "Tem dificuldade para se organizar, planejar etapas de projetos complexos, estimar o tempo ou evitar a procrastinação extrema?",
          options: [
            { text: "Consigo me organizar bem sem grandes percalços", score: 1 },
            { text: "Organizo-me com esforço adicional constante", score: 2 },
            { text: "Sinto-me paralisado pela desorganização ou perco prazos", score: 3 }
          ]
        },
        {
          id: 4,
          category: "Regulação Emocional",
          question: "Como o estresse diário, ansiedade elevada ou oscilações de humor impactam sua rotina profissional e seus relacionamentos?",
          options: [
            { text: "Impacto mínimo, consigo lidar saudavelmente", score: 1 },
            { text: "Impacto moderado, gera cansaço temporário", score: 2 },
            { text: "Impacto severo, com fobias ou crises constantes", score: 3 }
          ]
        },
        {
          id: 5,
          category: "Fadiga Mental",
          question: "Sente esgotamento mental inexplicável ou 'névoa cerebral' (fog cognitivo) em que os pensamentos parecem lentos ou turvos?",
          options: [
            { text: "Quase nunca", score: 1 },
            { text: "Esporadicamente, no finzinho da semana", score: 2 },
            { text: "Diariamente, acordando já exausto(a)", score: 3 }
          ]
        }
      ];

      const handleSelectQuizOption = (optionScore) => {
        setQuizAnswers(prev => ({ ...prev, [currentQuizQuestion]: optionScore }));
        if (currentQuizQuestion < quizQuestions.length - 1) {
          setCurrentQuizQuestion(prev => prev + 1);
        } else {
          setQuizCompleted(true);
        }
      };

      const getQuizResult = () => {
        const totalScore = Object.values(quizAnswers).reduce((sum, score) => sum + score, 0);
        if (totalScore <= 7) {
          return {
            rating: "Equilibrado",
            level: "Nível de Bem-Estar Estável",
            description: "Seus relatos sugerem que suas funções cognitivas e regulação emocional encontram-se em um padrão saudável. Pequenos lapsos fazem parte da rotina natural.",
            recommendation: "A Psicoterapia Clínica voltada para o autoconhecimento pode ser excelente para expandir seu bem-estar."
          };
        } else if (totalScore <= 11) {
          return {
            rating: "Moderado",
            level: "Sinais de Alerta Cognitivo ou Emocional",
            description: "Suas respostas apontam para flutuações moderadas de foco, memória ou regulação emocional, provavelmente potencializadas por estresse ou sobrecarga.",
            recommendation: "Indicamos realizar uma consulta de Orientação Psicológica para desacelerar e blindar sua mente."
          };
        } else {
          return {
            rating: "Atenção",
            level: "Prejuízos Cognitivos Relevantes Detectados",
            description: "Há indicativos de dificuldades severas ou persistentes no foco, controle de tarefas e regulação que parecem prejudicar sua rotina.",
            recommendation: "Recomendamos fortemente realizar uma Avaliação Neuropsicológica para mapear esses padrões e traçar um laudo assertivo."
          };
        }
      };

      const resetQuiz = () => {
        setQuizAnswers({});
        setCurrentQuizQuestion(0);
        setQuizCompleted(false);
        setQuizStarted(false);
      };

      const handleFormChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        if (!formData.nome || !formData.telefone) return;
        setIsSubmitting(true);

        fetch("https://formsubmit.co/ajax/psicologa.giovanaguimara@gmail.com", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            "Nome Completo": formData.nome,
            "WhatsApp / Celular": formData.telefone,
            "E-mail de Contato": formData.email || "Não informado",
            "Serviço Pretendido": formData.servico,
            "Período Preferencial": formData.periodo,
            "Mensagem / Queixas": formData.mensagem || "Formulário enviado pelo portfólio digital."
          })
        })
        .then(() => {
          setFormSubmitted(true);
        })
        .catch((err) => {
          console.error("Erro ao enviar formulário por e-mail:", err);
          setFormSubmitted(true);
        })
        .finally(() => {
          setIsSubmitting(false);
        });
      };

      const getWhatsAppLink = () => {
        const baseText = `Olá Dra. Giovana Guimara, gostaria de solicitar uma consulta! 🌸\n\n` +
          `*Meus Dados:*\n` +
          `- Nome: ${formData.nome}\n` +
          `- E-mail: ${formData.email || "Não informado"}\n` +
          `- Whatsapp: ${formData.telefone}\n` +
          `- Serviço: ${formData.servico}\n` +
          `- Período Preferencial: ${formData.periodo}\n` +
          `- Mensagem: ${formData.mensagem || "Gostaria de agendar."}\n\n` +
          `_Enviado através do seu Portfólio Digital_`;
        return `https://wa.me/5547991127699?text=${encodeURIComponent(baseText)}`;
      };

      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 40);
        };
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      return (
        <div class="fade-in">
          
          {/* HEADER / NAV */}
          <header className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${
            scrolled ? "bg-white/95 backdrop-blur-md shadow-sm border-b border-brand-100 py-3" : "bg-transparent py-5"
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
              <Logo customLogoSrc={customLogo} />
              
              <nav className="hidden lg:flex items-center gap-8">
                {navItems.map((item, idx) => (
                  <a
                    key={idx}
                    href={item.id}
                    className="font-medium text-sm text-brand-900/85 hover:text-brand-500 transition-colors py-1.5 border-b-2 border-transparent hover:border-brand-300"
                  >
                    {item.label}
                  </a>
                ))}
              </nav>

              <div className="hidden lg:flex items-center gap-4">
                <a href="#agendamento" className="inline-flex items-center gap-2 bg-brand-400 hover:bg-brand-500 text-white font-semibold text-sm px-5 py-2.5 rounded-full shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5">
                  <Icon name="calendar" className="w-4 h-4" />
                  <span>Agendar Consulta</span>
                </a>
              </div>

              <button 
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                className="lg:hidden p-2 text-brand-900 rounded-lg hover:bg-brand-100/50"
              >
                <Icon name={mobileMenuOpen ? "x" : "menu"} className="w-6 h-6" />
              </button>
            </div>

            {/* MOBILE NAV PANEL */}
            {mobileMenuOpen && (
              <div className="lg:hidden bg-white border-b border-brand-100 shadow-lg absolute top-full left-0 right-0 py-4 px-6 space-y-2">
                {navItems.map((item, idx) => (
                  <a
                    key={idx}
                    href={item.id}
                    onClick={() => setMobileMenuOpen(false)}
                    className="block font-medium text-base text-brand-950 hover:text-brand-500 hover:bg-brand-50/50 py-2.5 px-3 rounded-lg transition-all"
                  >
                    {item.label}
                  </a>
                ))}
                <div className="pt-4 border-t border-brand-100">
                  <a href="#agendamento" onClick={() => setMobileMenuOpen(false)} className="w-full text-center py-3 bg-brand-400 hover:bg-brand-500 text-white font-semibold rounded-xl flex items-center justify-center gap-2">
                    <Icon name="calendar" className="w-4 h-4" />
                    <span>Pré-Agendar</span>
                  </a>
                </div>
              </div>
            )}
          </header>

          {/* HERO */}
          <section id="inicio" className="relative pt-28 pb-16 lg:pt-40 lg:pb-28 overflow-hidden bg-gradient-to-b from-brand-100/50 via-white to-brand-50/30">
            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-200/10 rounded-full blur-3xl -z-10" />
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                
                <div className="lg:col-span-7 space-y-6 text-center lg:text-left">
                  <div className="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full bg-brand-100 text-brand-800 font-semibold text-xs uppercase tracking-wider">
                    <Icon name="sparkles" className="w-3.5 h-3.5 text-brand-500" />
                    <span>Presencial em Itajaí & Online</span>
